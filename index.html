<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>相続相談 来店予約システム</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="app">
<header>
  <div class="header-inner">
    <div class="brand">
      <div class="logo" aria-hidden="true"><span>JA</span></div>
      <div class="brand-copy">
        <span class="brand-kicker">JAしまね</span>
        <h1>相続相談 来店予約</h1>
        <small>専門スタッフへのご相談を、かんたん予約</small>
      </div>
    </div>
    <div id="headerMonthControls" class="header-month-controls">
      <button class="btn secondary compact-btn" onclick="moveAdminReservationMonth(-1)" aria-label="前の月">‹</button>
      <strong id="headerMonthLabel"></strong>
      <button class="btn secondary compact-btn" onclick="moveAdminReservationMonth(1)" aria-label="次の月">›</button>
      <button class="btn secondary compact-btn today-btn" onclick="resetAdminReservationMonth()">今日に戻る</button>
    </div>
    <div class="header-actions">
      <div id="calendarLargeControls" class="calendar-large-controls">
        <label>支店
          <select id="headerFilterBranch" onchange="window._fb=this.value;renderAdmin()">
          </select>
        </label>
        <button class="btn secondary compact-btn" onclick="toggleCalendarLayout()">横並び表示にする</button>
      </div>
      <div class="mode-switch" id="mainModeSwitch">
        <button id="adminModeBtn">管理画面</button>
        <button id="userModeBtn" class="active">予約画面</button>
      </div>
    </div>
  </div>
</header>

<main>
<section id="userApp">
  <div class="booking-wrap">
    <aside class="panel side">
      <span class="side-kicker">相続のご相談</span>
      <h2>相続相談のご予約</h2>
      <p>ご希望の支店・日時を選び、必要事項をご入力ください。</p>
      <div class="booking-facts" aria-label="予約のご案内">
        <div><strong>90分</strong><span>相談時間</span></div>
        <div><strong>無料</strong><span>相談料</span></div>
      </div>
      <div class="steps" id="steps"></div>
      <p class="privacy-note">入力内容は相談準備とご連絡のために大切に取り扱います。</p>
    </aside>
    <section class="panel content-wrap">
      <div class="mobile-progress" id="mobileProgress"></div>
      <div class="content" id="bookingContent"></div>
    </section>
  </div>
</section>

<section id="adminApp" class="admin">
  <div class="admin-header-menu">
    <button class="active" data-admin="reservations">予約一覧</button>
    <button data-admin="blocks">対応不可枠設定</button>
    <button data-admin="settings">基本設定</button>
  </div>
  <section class="panel admin-content" id="adminContent"></section>
</section>
</main>
</div>

<script src="script.js"></script>
</body>
</html>
